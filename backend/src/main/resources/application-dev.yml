# Development Profile Overrides
# These settings will override the base application.yml
spring:
  data:
    redis:
      # Overrides base to include a password placeholder
      url: ${REDIS_URL:redis://:password@localhost:6379}

  elasticsearch:
    # Overrides base to remove username/password for dev
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

security:
  rate-limit:
    login:
      limit: ${SECURITY_RATE_LIMIT_LOGIN_LIMIT:2147483647}
      window: ${SECURITY_RATE_LIMIT_LOGIN_WINDOW:PT1H}
    register:
      limit: ${SECURITY_RATE_LIMIT_REGISTER_LIMIT:2147483647}
      window: ${SECURITY_RATE_LIMIT_REGISTER_WINDOW:PT1H}

app:
  elasticsearch:
    startup:
      auto-unblock-read-only: ${APP_ES_STARTUP_AUTO_UNBLOCK_READ_ONLY:true}
      disable-disk-threshold: ${APP_ES_STARTUP_DISABLE_DISK_THRESHOLD:true}
