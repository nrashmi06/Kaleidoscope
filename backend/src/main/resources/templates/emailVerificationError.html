<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Failed | Kaleidoscope</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0b0b0e; 
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #141418; 
            border-radius: 12px;
            border: 1px solid #3b82f6; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: float 5s ease-in-out infinite; 
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .header {
            padding: 25px 20px 10px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }
        .header h1 {
            margin: 0;
            font-size: 26px;
            color: #3b82f6; 
            letter-spacing: 0.5px;
        }
        .content {
            padding: 0 30px 20px;
            text-align: center;
        }
        .content img {
            width: 180px;
            height: auto;
            margin: 15px 0;
            border-radius: 8px;
            opacity: 0.9; 
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #3b82f6;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            margin: 15px 5px 5px;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: #2563eb;
        }
        .footer {
            padding: 15px;
            text-align: center;
            font-size: 13px;
            color: #888;
            border-top: 1px solid #222;
            border-radius: 0 0 12px 12px;
        }
        .error-msg {
            color: #e2e8f0;
            margin: 15px 0;
            padding: 12px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            background: rgba(59, 130, 246, 0.05);
        }
        .warning {
            color: #3b82f6;
            font-size: 45px;
            margin: 10px 0 0;
        }
        .help-list {
            text-align: left;
            display: inline-block;
            margin: 15px 0;
            color: #a0aec0;
            line-height: 1.6;
        }
        .help-list li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Verification Failed</h1>
    </div>
    <div class="content">
        <div class="warning">⚠</div>
        <div class="error-msg">
            <p th:text="${message}">Invalid or expired verification link.</p>
        </div>
        
        <img src="https://img.freepik.com/free-vector/error-404-concept-illustration_114360-1811.jpg"
             alt="Error"
             width="200">
             
        <ul class="help-list">
            <li>Check the verification link for typos.</li>
            <li>Request a new verification email.</li>
            <li>Contact support if the issue persists.</li>
        </ul>
    </div>
    <div class="footer">
        <p>&copy; 2026 Kaleidoscope</p>
    </div>
</div>
</body>
</html>
