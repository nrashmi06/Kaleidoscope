<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject}">Important Update | Kaleidoscope</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0b0b0e;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: #141418;
            border-radius: 12px;
            border: 1px solid #ef4444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .header {
            padding: 25px 20px 10px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            color: #ef4444;
        }

        .content {
            padding: 0 30px 25px;
        }

        .alert-icon {
            text-align: center;
            font-size: 42px;
            color: #ef4444;
            margin-top: 10px;
        }

        .message-box {
            margin: 15px 0;
            padding: 16px;
            border-radius: 6px;
            border: 1px solid rgba(239,68,68,0.3);
            background: rgba(239,68,68,0.05);
            color: #e2e8f0;
            line-height: 1.6;
        }

        .footer {
            padding: 15px;
            text-align: center;
            font-size: 13px;
            color: #888;
            border-top: 1px solid #222;
        }
    </style>
</head>

<body>
<div class="container">

    <div class="header">
        <h1 th:text="${subject}">Important Update</h1>
    </div>

    <div class="content">

        <div class="alert-icon">⚠</div>

        <div class="message-box" th:utext="${body}">
            <p>This is a system-wide broadcast.</p>
        </div>

    </div>

    <div class="footer">
        <p>This is an emergency broadcast from Kaleidoscope. You received this email regardless of your notification settings.</p>
    </div>

</div>
</body>
</html>
