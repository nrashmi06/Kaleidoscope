<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset | Kaleidoscope</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0b0b0e;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #141418;
            border-radius: 12px;
            border: 1px solid #6366f1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            padding: 25px 20px 10px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            color: #6366f1;
        }

        .content {
            padding: 20px 30px;
            text-align: center;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .code-box {
            margin: 20px 0;
            padding: 15px;
            font-size: 28px;
            letter-spacing: 6px;
            font-weight: bold;
            border-radius: 8px;
            border: 1px solid rgba(99,102,241,0.4);
            background: rgba(99,102,241,0.08);
            color: #a5b4fc;
        }

        .note {
            font-size: 14px;
            color: #cbd5f5;
            margin-top: 10px;
        }

        .footer {
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #222;
        }
    </style>
</head>

<body>
<div class="container">

    <div class="header">
        <h1>Password Reset</h1>
    </div>

    <div class="content">

        <div class="icon">🔐</div>

        <p>We received a request to reset your password.</p>
        <p>Use the verification code below:</p>

        <div class="code-box" th:text="${code}">
            123456 plaecholder
        </div>

        <p class="note">
            This code will expire shortly. Do not share it with anyone.
        </p>

        <p class="note">
            If you didn’t request this, you can safely ignore this email.
        </p>

    </div>

    <div class="footer">
        <p>&copy; 2026 Kaleidoscope. All rights reserved.</p>
    </div>

</div>
</body>
</html>
