<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Deep Cosmic Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0f0926" />
      <stop offset="100%" stop-color="#05020c" />
    </linearGradient>

    <!-- Glowing Accents -->
    <filter id="blur-large" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70" />
    </filter>
    <filter id="blur-medium" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="25" />
    </filter>
    <filter id="play-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop Shadows -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.65" />
    </filter>
    <filter id="btn-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <!-- Video Seek Bar Gradient -->
    <linearGradient id="seek-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Glassmorphic Card Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.03" />
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.01" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15" />
    </linearGradient>

    <!-- Play Button Pink/Red Gradient -->
    <linearGradient id="play-btn-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
  </defs>

  <!-- 1. Card Canvas with deep shadow -->
  <rect x="10" y="10" width="780" height="430" rx="24" fill="url(#bg-grad)" filter="url(#drop-shadow)" />

  <!-- 2. Ambient Fluid Lighting Mesh (Glowing Orbs) -->
  <circle cx="150" cy="120" r="160" fill="#4338ca" fill-opacity="0.25" filter="url(#blur-large)" />
  <circle cx="650" cy="300" r="180" fill="#db2777" fill-opacity="0.18" filter="url(#blur-large)" />
  <circle cx="400" cy="225" r="100" fill="#6366f1" fill-opacity="0.15" filter="url(#blur-large)" />

  <!-- 3. Fine Dot Matrix Overlay for Tech Texture -->
  <pattern id="dot-grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.06" />
  </pattern>
  <rect x="10" y="10" width="780" height="430" rx="24" fill="url(#dot-grid)" />

  <!-- 4. Glassmorphic Outer Border -->
  <rect x="10" y="10" width="780" height="430" rx="24" fill="none" stroke="url(#border-grad)" stroke-width="2" />

  <!-- 5. Top Bar Header -->
  <g transform="translate(40, 45)">
    <!-- Platform Geometric Logo Icon -->
    <g transform="translate(0, 0)">
      <polygon points="12,0 24,7 24,21 12,28 0,21 0,7" fill="none" stroke="#6366f1" stroke-width="2" />
      <polygon points="12,4 20,9 20,19 12,24 4,19 4,9" fill="#ec4899" fill-opacity="0.6" />
      <circle cx="12" cy="14" r="3" fill="#ffffff" />
    </g>

    <!-- Platform Title -->
    <text x="36" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffffff" letter-spacing="1.5">
      KALEIDOSCOPE
    </text>
    <text x="185" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#64748b" letter-spacing="0.5">
      ENTERPRISE ARCHITECTURE
    </text>
  </g>

  <!-- 6. Top Right Pill Badge (Video Duration) -->
  <g transform="translate(640, 42)">
    <rect width="120" height="28" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
    <!-- Recording Red Indicator Dot -->
    <circle cx="18" cy="14" r="4" fill="#f43f5e" />
    <text x="32" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#f1f5f9" letter-spacing="0.5">
      24:01 MINS
    </text>
  </g>

  <!-- 7. Center Premium Play Button -->
  <g transform="translate(400, 215)" filter="url(#btn-shadow)">
    <!-- Outermost soft spinning glow ring -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="10 15" />
    
    <!-- Outer glass ring with gradient glow -->
    <circle cx="0" cy="0" r="56" fill="#ffffff" fill-opacity="0.03" stroke="url(#seek-grad)" stroke-width="2" stroke-opacity="0.8" />
    
    <!-- Deep Glass Plate -->
    <circle cx="0" cy="0" r="46" fill="#0f0926" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />

    <!-- Pulsing Action Red Circle -->
    <circle cx="0" cy="0" r="38" fill="url(#play-btn-grad)" filter="url(#play-glow)" />

    <!-- High-Fidelity Rounded Play Triangle -->
    <path d="M -6,-11 L 12,0 L -6,11 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />
  </g>

  <!-- 8. Video Information Text -->
  <text x="400" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="0.5">
    Project Walkthrough &amp; Code Review
  </text>
  <text x="400" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">
    Click to play complete walkthrough video of Kaleidoscope
  </text>

  <!-- 9. Dynamic Video Player Seek Bar -->
  <g transform="translate(50, 385)">
    <!-- Timeline Line Background -->
    <line x1="0" y1="0" x2="700" y2="0" stroke="#ffffff" stroke-opacity="0.12" stroke-width="4" stroke-linecap="round" />
    
    <!-- Loaded Timeline Bar (e.g. 45% loaded) -->
    <line x1="0" y1="0" x2="315" y2="0" stroke="url(#seek-grad)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Glowing Seek Head Knob -->
    <circle cx="315" cy="0" r="6" fill="#ffffff" filter="url(#play-glow)" />
    <circle cx="315" cy="0" r="12" fill="#ffffff" fill-opacity="0.15" />

    <!-- Time Stamps -->
    <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#475569">
      00:00
    </text>
    <text x="700" y="20" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#475569">
      24:01
    </text>
  </g>
</svg>
